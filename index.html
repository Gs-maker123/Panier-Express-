<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Panier Express+ · Courses & inventaire</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="data:application/manifest+json,{}">
  <meta name="theme-color" content="#0066cc">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="header-row">
        <h1>🛒 Panier Express+</h1>
        <button id="themeToggle" class="theme-btn" title="Mode nuit" aria-label="Changer de thème (nuit/jour)">🌙</button>
      </div>
      <p class="subtitle">Inventaire + liste de courses avec prix</p>
    </header>

    <!-- === SECTION LISTE DE COURSES (déplacée en premier) === -->
    <section class="shopping-section">
      <div class="shopping-header">
        <h2>🛍️ Liste de courses</h2>
        <button id="toggleShoppingBtn" class="btn-ghost">▼ Afficher</button>
      </div>

      <div class="budget-control">
        <label for="budgetInput">💰 Budget max :</label>
        <input type="number" id="budgetInput" step="0.01" placeholder="ex: 50" value="50">
        <span>€</span>
      </div>

      <div id="shoppingListContainer" class="shopping-list-container hidden">
        <div id="shoppingListContent" class="shopping-list"></div>
        <div class="shopping-actions">
          <button id="shareListBtn" class="btn-secondary">📤 Partager</button>
          <button id="copyListBtn" class="btn-secondary">📋 Copier</button>
          <button id="printListBtn" class="btn-secondary">🖨️ Imprimer / PDF</button>
        </div>
      </div>
    </section>

    <!-- === AJOUT RAPIDE D'ARTICLE === -->
    <div class="add-article-panel">
      <input type="text" id="newArticleName" placeholder="Nouvel article (ex. Farine)" autocomplete="off">
      <select id="newArticleUnit">
        <option value="pcs">pièce(s)</option>
        <option value="kg">kg</option>
        <option value="L">L</option>
        <option value="pack">paquet(s)</option>
        <option value="roll">rouleau(x)</option>
        <option value="other">autre</option>
      </select>
      <select id="newArticleCategory">
        <!-- les catégories seront ajoutées par JS -->
      </select>
      <button id="addArticleBtn" class="btn-primary">+ Ajouter</button>
    </div>

    <!-- === FILTRE PAR CATÉGORIE === -->
    <div class="filter-section">
      <label for="categoryFilter">🔍 Filtrer par catégorie :</label>
      <select id="categoryFilter">
        <option value="all">Toutes les catégories</option>
      </select>
      <button id="addCategoryBtn" class="btn-small" title="Ajouter une catégorie">+ Nouvelle catégorie</button>
    </div>

    <!-- === ACTIONS GLOBALES (EXPORT, IMPORT, RESET) === -->
    <div class="actions-bar">
      <button id="exportBtn" class="btn-secondary">📁 Exporter</button>
      <button id="importBtn" class="btn-secondary">📂 Importer</button>
      <input type="file" id="importFile" accept=".json" style="display: none;">
      <button id="resetDemoBtn" class="btn-outline">🔄 Exemple par défaut</button>
    </div>

    <!-- === INVENTAIRE === -->
    <section class="inventory-section">
      <h2>📦 Mon inventaire</h2>
      <div id="articlesGrid" class="articles-grid"></div>
    </section>
  </div>

  <!-- Bouton retour en haut -->
  <button id="scrollToTopBtn" class="scroll-to-top" title="Retour en haut">↑</button>

  <script src="app.js"></script>
</body>
</html>
